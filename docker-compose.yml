services:
  server:
    build: 
      context: ./nest
      dockerfile: Dockerfile
    # ##this method run from pre-built and pushed to docker hub image
    # image: YOUR_IMAGE_HERE
    container_name: server-nest
    restart: unless-stopped
    environment:
      - MONGO_URL= # your mongo url here
      - PORT=5000
  load-balancer:
  # these 2 under are oposite, build and run locally
    build: 
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "5000:5000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped
    depends_on:
      - server
  blog-client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: client
    ports:
      - "3000:3000"
    # env_file: ./client/.env.production
    environment:
      - NEXT_PUBLIC_SERVER=http://localhost:5000
    depends_on:
      - load-balancer