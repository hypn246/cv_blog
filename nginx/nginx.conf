worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;

    keepalive_timeout  65;

    upstream service{
        server server:5000;
    }

    server {
        listen       5000;
        server_name  localhost;

        location =/ {
            proxy_pass http://service;
            proxy_set_header Host $host;  # Pass original host header
            proxy_set_header X-Real-IP $remote_addr;  # Pass client IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Forwarded for header
            proxy_set_header X-Forwarded-Proto $scheme;  # Forwarded protocol
            set $bypass $http_cache_purge;
        }
        location =/blog {
            proxy_pass http://service/blog;
            proxy_set_header Host $host;  # Pass original host header
            proxy_set_header X-Real-IP $remote_addr;  # Pass client IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Forwarded for header
            proxy_set_header X-Forwarded-Proto $scheme;  # Forwarded protocol
            set $bypass $http_cache_purge;
        }
        location ~ ^/blog/(.+)$ {
            proxy_pass http://service/blog/$1; 
            proxy_set_header Host $host;  # Pass original host header
            proxy_set_header X-Real-IP $remote_addr;  # Pass client IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Forwarded for header
            proxy_set_header X-Forwarded-Proto $scheme;  # Forwarded protocol
            set $bypass $http_cache_purge;
        }
        location /static/image {
            proxy_pass http://service/_next/image; 
            proxy_set_header Host $host;  # Pass original host header
            proxy_set_header X-Real-IP $remote_addr;  # Pass client IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Forwarded for header
            proxy_set_header X-Forwarded-Proto $scheme;  # Forwarded protocol
            set $bypass $http_cache_purge;
        }
        location /_next {
            proxy_pass http://service/_next; 
            proxy_set_header Host $host;  # Pass original host header
            proxy_set_header X-Real-IP $remote_addr;  # Pass client IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # Forwarded for header
            proxy_set_header X-Forwarded-Proto $scheme;  # Forwarded protocol
            set $bypass $http_cache_purge;
        }

        error_page 502 /502.html;  # Handle bad gateway errors
        location = /502.html {
            internal;  
        }

        # Logging
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
    }
}